<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1300 920" font-family="'Segoe UI', Arial, Helvetica, sans-serif">
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f0f4ff"/>
      <stop offset="100%" style="stop-color:#faf5ff"/>
    </linearGradient>
    <linearGradient id="header-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2c3e50"/>
      <stop offset="100%" style="stop-color:#1a1a2e"/>
    </linearGradient>
    <linearGradient id="step-quantum" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#667eea"/>
      <stop offset="100%" style="stop-color:#764ba2"/>
    </linearGradient>
    <linearGradient id="step-classical" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f093fb"/>
      <stop offset="100%" style="stop-color:#f5576c"/>
    </linearGradient>
    <linearGradient id="box-blue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4fd"/>
      <stop offset="100%" style="stop-color:#dbeafe"/>
    </linearGradient>
    <linearGradient id="box-purple" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f3e8ff"/>
      <stop offset="100%" style="stop-color:#ede9fe"/>
    </linearGradient>
    <linearGradient id="box-pink" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fce7f3"/>
      <stop offset="100%" style="stop-color:#ffe4e6"/>
    </linearGradient>
    <linearGradient id="box-green" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#d1fae5"/>
      <stop offset="100%" style="stop-color:#d0fcf0"/>
    </linearGradient>
    <linearGradient id="step-green" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#43e97b"/>
      <stop offset="100%" style="stop-color:#38f9d7"/>
    </linearGradient>
    <filter id="shadow" x="-3%" y="-3%" width="106%" height="110%">
      <feDropShadow dx="1" dy="2" stdDeviation="3" flood-opacity="0.12"/>
    </filter>
    <marker id="arrow-down" viewBox="0 0 10 10" refX="5" refY="9" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 5 10 L 10 0 z" fill="#555"/>
    </marker>
    <marker id="arrow-right" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#667eea"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1300" height="920" fill="url(#bg-grad)" rx="10"/>

  <!-- Header -->
  <rect x="0" y="0" width="1300" height="55" fill="url(#header-grad)" rx="10"/>
  <rect x="0" y="27" width="1300" height="28" fill="url(#header-grad)"/>
  <text x="650" y="36" text-anchor="middle" fill="white" font-size="20" font-weight="bold">Mathematical Walkthrough — Variational Quantum Classifier</text>

  <!-- Setup section -->
  <rect x="25" y="70" width="1250" height="55" rx="6" fill="white" stroke="#ccc" stroke-width="1" filter="url(#shadow)"/>
  <text x="40" y="92" fill="#2c3e50" font-size="14" font-weight="bold">Setup:</text>
  <text x="40" y="112" fill="#555" font-size="12">2 qubits · 1 variational layer · Amplitude encoding · Data: <tspan fill="#e74c3c" font-weight="bold">x = [0.6, 0.8]</tspan> (padded → [0.6, 0.8, 0, 0]) · True label: <tspan fill="#e74c3c" font-weight="bold">y = 1</tspan></text>

  <!-- ============================================================ -->
  <!-- STEP 1: ENCODING -->
  <!-- ============================================================ -->
  <rect x="25" y="140" width="400" height="240" rx="8" fill="white" stroke="#667eea" stroke-width="2" filter="url(#shadow)"/>
  <rect x="25" y="140" width="400" height="30" rx="8" fill="url(#step-quantum)"/>
  <rect x="25" y="155" width="400" height="15" fill="url(#step-quantum)"/>
  <text x="225" y="160" text-anchor="middle" fill="white" font-size="13" font-weight="bold">STEP 1: Data Encoding (Quantum)</text>

  <text x="40" y="192" fill="#2c3e50" font-size="12" font-weight="bold">Initial state:</text>
  <text x="40" y="210" fill="#555" font-size="12">|ψ₀⟩ = |00⟩ = [1, 0, 0, 0]<tspan font-size="10" dy="4">ᵀ</tspan></text>

  <text x="40" y="235" fill="#2c3e50" font-size="12" font-weight="bold">AmplitudeEmbedding([0.6, 0.8, 0, 0], normalize=True):</text>
  <text x="40" y="255" fill="#555" font-size="12">Amplitudes ← feature values directly.</text>

  <line x1="40" y1="265" x2="410" y2="265" stroke="#e0e0e0" stroke-width="0.5"/>

  <text x="40" y="283" fill="#e74c3c" font-size="12" font-weight="bold">|ψ₁⟩ = 0.6|00⟩ + 0.8|01⟩ + 0|10⟩ + 0|11⟩</text>

  <!-- Amplitude visualization -->
  <text x="60" y="310" fill="#666" font-size="10">|00⟩</text>
  <rect x="95" y="295" width="60" height="18" rx="2" fill="#667eea" opacity="0.7"/>
  <text x="125" y="309" text-anchor="middle" fill="white" font-size="10" font-weight="bold">0.6</text>

  <text x="175" y="310" fill="#666" font-size="10">|01⟩</text>
  <rect x="210" y="288" width="80" height="18" rx="2" fill="#764ba2" opacity="0.8"/>
  <text x="250" y="309" text-anchor="middle" fill="white" font-size="10" font-weight="bold">0.8</text>

  <text x="300" y="310" fill="#ccc" font-size="10">|10⟩</text>
  <rect x="335" y="312" width="3" height="3" rx="1" fill="#ddd"/>

  <text x="350" y="310" fill="#ccc" font-size="10">|11⟩</text>
  <rect x="385" y="312" width="3" height="3" rx="1" fill="#ddd"/>

  <text x="225" y="345" text-anchor="middle" fill="#999" font-size="10">Amplitude encoding maps data directly to quantum state amplitudes</text>
  <text x="225" y="360" text-anchor="middle" fill="#999" font-size="10">(Length 2⁰ = 4 achieved via pad_with=0)</text>

  <!-- ============================================================ -->
  <!-- STEP 2: VARIATIONAL LAYER -->
  <!-- ============================================================ -->
  <rect x="450" y="140" width="410" height="240" rx="8" fill="white" stroke="#667eea" stroke-width="2" filter="url(#shadow)"/>
  <rect x="450" y="140" width="410" height="30" rx="8" fill="url(#step-quantum)"/>
  <rect x="450" y="155" width="410" height="15" fill="url(#step-quantum)"/>
  <text x="655" y="160" text-anchor="middle" fill="white" font-size="13" font-weight="bold">STEP 2: Variational Circuit (Quantum)</text>

  <text x="465" y="192" fill="#2c3e50" font-size="12" font-weight="bold">Layer: Rot(θ) on each qubit + CNOT ring</text>

  <!-- Simple circuit diagram -->
  <line x1="475" y1="218" x2="840" y2="218" stroke="#667eea" stroke-width="1.5"/>
  <text x="468" y="222" text-anchor="end" fill="#667eea" font-size="10">q₀ |0⟩</text>

  <line x1="475" y1="258" x2="840" y2="258" stroke="#667eea" stroke-width="1.5"/>
  <text x="468" y="262" text-anchor="end" fill="#667eea" font-size="10">q₁ |0⟩</text>

  <!-- Rot gates -->
  <rect x="510" y="207" width="55" height="22" rx="3" fill="white" stroke="#764ba2" stroke-width="1.2"/>
  <text x="537" y="222" text-anchor="middle" fill="#764ba2" font-size="9" font-weight="bold">Rot(0.5)</text>

  <rect x="510" y="247" width="55" height="22" rx="3" fill="white" stroke="#764ba2" stroke-width="1.2"/>
  <text x="537" y="262" text-anchor="middle" fill="#764ba2" font-size="9" font-weight="bold">Rot(1.0)</text>

  <!-- CNOT -->
  <circle cx="630" cy="218" r="4" fill="#667eea"/>
  <line x1="630" y1="218" x2="630" y2="258" stroke="#667eea" stroke-width="2"/>
  <circle cx="630" cy="258" r="5" fill="none" stroke="#667eea" stroke-width="2"/>
  <line x1="626" y1="254" x2="634" y2="262" stroke="#667eea" stroke-width="2"/>
  <line x1="634" y1="254" x2="626" y2="262" stroke="#667eea" stroke-width="2"/>

  <!-- CNOT ring q1→q0 -->
  <circle cx="680" cy="258" r="4" fill="#667eea"/>
  <path d="M 680 258 Q 710 258 710 238 Q 710 218 680 218" fill="none" stroke="#667eea" stroke-width="2"/>
  <circle cx="680" cy="218" r="5" fill="none" stroke="#667eea" stroke-width="2"/>
  <line x1="676" y1="214" x2="684" y2="222" stroke="#667eea" stroke-width="2"/>
  <line x1="684" y1="214" x2="676" y2="222" stroke="#667eea" stroke-width="2"/>

  <!-- Math results -->
  <line x1="465" y1="278" x2="845" y2="278" stroke="#e0e0e0" stroke-width="0.5"/>

  <text x="465" y="298" fill="#2c3e50" font-size="12" font-weight="bold">After rotation + entanglement:</text>
  <text x="465" y="318" fill="#e74c3c" font-size="12">|ψ₂⟩ ≈ 0.14|00⟩ + 0.96|01⟩ + 0.24|10⟩ + 0.04|11⟩</text>

  <text x="465" y="345" fill="#999" font-size="10">Rot(θ) = RZ(ω) · RY(θ) · RZ(φ) — general single-qubit rotation</text>
  <text x="465" y="360" fill="#999" font-size="10">CNOT creates entanglement between qubits</text>

  <!-- ============================================================ -->
  <!-- STEP 3: MEASUREMENT -->
  <!-- ============================================================ -->
  <rect x="885" y="140" width="390" height="240" rx="8" fill="white" stroke="#f093fb" stroke-width="2" filter="url(#shadow)"/>
  <rect x="885" y="140" width="390" height="30" rx="8" fill="url(#step-classical)"/>
  <rect x="885" y="155" width="390" height="15" fill="url(#step-classical)"/>
  <text x="1080" y="160" text-anchor="middle" fill="white" font-size="13" font-weight="bold">STEP 3: Measurement + Classification (Classical)</text>

  <text x="900" y="195" fill="#2c3e50" font-size="12" font-weight="bold">Measure Pauli-Z expectation on qubit 0:</text>

  <text x="900" y="218" fill="#555" font-size="12">⟨Z₀⟩ = ⟨ψ₂| (Z ⊗ I) |ψ₂⟩</text>

  <text x="900" y="240" fill="#555" font-size="12">= |⟨00|ψ₂⟩|² + |⟨01|ψ₂⟩|² − |⟨10|ψ₂⟩|² − |⟨11|ψ₂⟩|²</text>

  <line x1="900" y1="250" x2="1260" y2="250" stroke="#e0e0e0" stroke-width="0.5"/>

  <text x="900" y="270" fill="#555" font-size="12">= 0.14² + 0.96² − 0.24² − 0.04²</text>
  <text x="900" y="290" fill="#555" font-size="12">= 0.02 + 0.92 − 0.06 − 0.00</text>

  <rect x="900" y="300" width="360" height="30" rx="4" fill="url(#box-green)" stroke="#43e97b" stroke-width="1"/>
  <text x="1080" y="320" text-anchor="middle" fill="#065f46" font-size="14" font-weight="bold">⟨Z₀⟩ ≈ 0.88</text>

  <line x1="900" y1="338" x2="1260" y2="338" stroke="#e0e0e0" stroke-width="0.5"/>

  <text x="900" y="358" fill="#2c3e50" font-size="12" font-weight="bold">Classification (bias = 0):</text>
  <rect x="900" y="365" width="360" height="28" rx="4" fill="url(#box-green)" stroke="#43e97b" stroke-width="1"/>
  <text x="1080" y="384" text-anchor="middle" fill="#065f46" font-size="13" font-weight="bold">sign(⟨Z₀⟩ + bias) = sign(0.88 + 0) = +1 → Class 1 ✓</text>

  <!-- ============================================================ -->
  <!-- LOSS & OPTIMIZATION (bottom) -->
  <!-- ============================================================ -->
  <rect x="25" y="400" width="1250" height="180" rx="8" fill="white" stroke="#43e97b" stroke-width="2" filter="url(#shadow)"/>
  <path d="M 25 408 Q 25 400 33 400 L 1242 400 Q 1250 400 1250 408 L 1250 430 L 25 430 Z" fill="url(#step-green)"/>
  <text x="650" y="420" text-anchor="middle" fill="white" font-size="13" font-weight="bold">STEP 4: Loss &amp; Optimization Loop (Classical)</text>

  <text x="40" y="455" fill="#2c3e50" font-size="12" font-weight="bold">Loss Calculation:</text>
  <text x="40" y="475" fill="#555" font-size="12">Square loss:  ℒ = (y − ŷ)²  =  (1 − 0.88)²  =  <tspan fill="#e74c3c" font-weight="bold">0.0144</tspan></text>

  <line x1="40" y1="488" x2="620" y2="488" stroke="#e0e0e0" stroke-width="0.5"/>

  <text x="40" y="508" fill="#2c3e50" font-size="12" font-weight="bold">Gradient Descent Update:</text>
  <text x="40" y="530" fill="#555" font-size="12">∂ℒ/∂θᵢ  →  PennyLane uses the <tspan font-weight="bold">parameter-shift rule</tspan> for exact gradients</text>
  <text x="40" y="550" fill="#555" font-size="12">θᵢ⁽ᵗᐩ¹⁾ = θᵢ⁽ᵗ⁾ − η · ∂ℒ/∂θᵢ   (η = learning rate, e.g. 0.5 for Nesterov)</text>

  <!-- Right side: Optimization visual -->
  <rect x="670" y="440" width="580" height="125" rx="6" fill="#f8fafc" stroke="#e0e0e0" stroke-width="1"/>

  <!-- Loop arrows -->
  <text x="700" y="465" fill="#2c3e50" font-size="12" font-weight="bold">Iterative Training Loop:</text>

  <rect x="700" y="478" width="110" height="30" rx="4" fill="url(#box-blue)" stroke="#667eea" stroke-width="1"/>
  <text x="755" y="497" text-anchor="middle" fill="#1e40af" font-size="10" font-weight="bold">Run Circuit</text>

  <line x1="810" y1="493" x2="830" y2="493" stroke="#555" stroke-width="1.5" marker-end="url(#arrow-right)"/>

  <rect x="835" y="478" width="110" height="30" rx="4" fill="url(#box-pink)" stroke="#f093fb" stroke-width="1"/>
  <text x="890" y="497" text-anchor="middle" fill="#9d174d" font-size="10" font-weight="bold">Compute Loss</text>

  <line x1="945" y1="493" x2="965" y2="493" stroke="#555" stroke-width="1.5" marker-end="url(#arrow-right)"/>

  <rect x="970" y="478" width="110" height="30" rx="4" fill="url(#box-green)" stroke="#43e97b" stroke-width="1"/>
  <text x="1025" y="497" text-anchor="middle" fill="#065f46" font-size="10" font-weight="bold">Update θ</text>

  <line x1="1080" y1="493" x2="1100" y2="493" stroke="#555" stroke-width="1.5" marker-end="url(#arrow-right)"/>

  <rect x="1105" y="478" width="120" height="30" rx="4" fill="url(#box-blue)" stroke="#667eea" stroke-width="1"/>
  <text x="1165" y="497" text-anchor="middle" fill="#1e40af" font-size="10" font-weight="bold">Converged?</text>

  <!-- Feedback arrow -->
  <path d="M 1165 508 L 1165 535 L 755 535 L 755 508" fill="none" stroke="#667eea" stroke-width="1.5" stroke-dasharray="4,2" marker-end="url(#arrow-right)"/>
  <text x="960" y="548" text-anchor="middle" fill="#667eea" font-size="10" font-style="italic">(repeat with new weights until convergence)</text>

  <!-- ============================================================ -->
  <!-- FULL PIPELINE SUMMARY (bottom) -->
  <!-- ============================================================ -->
  <rect x="25" y="600" width="1250" height="100" rx="8" fill="white" stroke="#888" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="650" y="622" text-anchor="middle" fill="#2c3e50" font-size="13" font-weight="bold">Complete Pipeline — One Forward Pass</text>

  <!-- Mini pipeline boxes -->
  <rect x="40" y="635" width="155" height="50" rx="5" fill="url(#box-blue)" stroke="#667eea" stroke-width="1.2"/>
  <text x="117" y="655" text-anchor="middle" fill="#1e40af" font-size="11" font-weight="bold">Raw Data</text>
  <text x="117" y="672" text-anchor="middle" fill="#555" font-size="10">x = [0.6, 0.8]</text>

  <line x1="195" y1="660" x2="215" y2="660" stroke="#555" stroke-width="1.5" marker-end="url(#arrow-right)"/>

  <rect x="220" y="635" width="155" height="50" rx="5" fill="url(#box-purple)" stroke="#764ba2" stroke-width="1.2"/>
  <text x="297" y="655" text-anchor="middle" fill="#4c1d95" font-size="11" font-weight="bold">Amplitude Encoding</text>
  <text x="297" y="672" text-anchor="middle" fill="#555" font-size="10">|ψ⟩ = Σ xᵢ|i⟩</text>

  <line x1="375" y1="660" x2="395" y2="660" stroke="#555" stroke-width="1.5" marker-end="url(#arrow-right)"/>

  <rect x="400" y="635" width="155" height="50" rx="5" fill="url(#box-purple)" stroke="#667eea" stroke-width="1.2"/>
  <text x="477" y="655" text-anchor="middle" fill="#1e40af" font-size="11" font-weight="bold">Variational Layers</text>
  <text x="477" y="672" text-anchor="middle" fill="#555" font-size="10">Rot(θ) + CNOT</text>

  <line x1="555" y1="660" x2="575" y2="660" stroke="#555" stroke-width="1.5" marker-end="url(#arrow-right)"/>

  <rect x="580" y="635" width="155" height="50" rx="5" fill="url(#box-pink)" stroke="#f093fb" stroke-width="1.2"/>
  <text x="657" y="655" text-anchor="middle" fill="#9d174d" font-size="11" font-weight="bold">⟨Z₀⟩ Measurement</text>
  <text x="657" y="672" text-anchor="middle" fill="#555" font-size="10">⟨Z₀⟩ = 0.88</text>

  <line x1="735" y1="660" x2="755" y2="660" stroke="#555" stroke-width="1.5" marker-end="url(#arrow-right)"/>

  <rect x="760" y="635" width="155" height="50" rx="5" fill="url(#box-green)" stroke="#43e97b" stroke-width="1.2"/>
  <text x="837" y="655" text-anchor="middle" fill="#065f46" font-size="11" font-weight="bold">Classification</text>
  <text x="837" y="672" text-anchor="middle" fill="#555" font-size="10">sign(0.88) = +1</text>

  <line x1="915" y1="660" x2="935" y2="660" stroke="#555" stroke-width="1.5" marker-end="url(#arrow-right)"/>

  <rect x="940" y="635" width="155" height="50" rx="5" fill="url(#box-pink)" stroke="#f5576c" stroke-width="1.2"/>
  <text x="1017" y="655" text-anchor="middle" fill="#9d174d" font-size="11" font-weight="bold">Loss</text>
  <text x="1017" y="672" text-anchor="middle" fill="#555" font-size="10">ℒ = 0.0144</text>

  <line x1="1095" y1="660" x2="1115" y2="660" stroke="#555" stroke-width="1.5" marker-end="url(#arrow-right)"/>

  <rect x="1120" y="635" width="130" height="50" rx="5" fill="url(#box-green)" stroke="#38f9d7" stroke-width="1.2"/>
  <text x="1185" y="655" text-anchor="middle" fill="#065f46" font-size="11" font-weight="bold">Optimizer</text>
  <text x="1185" y="672" text-anchor="middle" fill="#555" font-size="10">Update θ</text>

  <!-- Feedback arrow -->
  <path d="M 1185 685 L 1185 700 L 117 700 L 117 685" fill="none" stroke="#667eea" stroke-width="1.5" stroke-dasharray="5,2" marker-end="url(#arrow-right)"/>
  <text x="650" y="713" text-anchor="middle" fill="#667eea" font-size="10" font-style="italic">θ ← new weights (repeat for each iteration)</text>

  <!-- ============================================================ -->
  <!-- KEY INSIGHT BOX -->
  <!-- ============================================================ -->
  <rect x="25" y="730" width="1250" height="85" rx="8" fill="#fff7ed" stroke="#f97316" stroke-width="1.5"/>
  <text x="40" y="755" fill="#c2410c" font-size="13" font-weight="bold">💡 Key Insight — How Does This Classify Data?</text>

  <text x="40" y="778" fill="#555" font-size="12">1. Different data points (<tspan fill="#e74c3c">x</tspan>) produce different initial quantum states → the circuit transforms them differently.</text>
  <text x="40" y="796" fill="#555" font-size="12">2. Training adjusts θ to make ⟨Z₀⟩ <tspan font-weight="bold">positive</tspan> for class 1 and <tspan font-weight="bold">negative</tspan> for class 0 across the dataset.</text>
  <text x="40" y="814" fill="#555" font-size="12">3. The CNOT gates create <tspan font-weight="bold">entanglement</tspan> — correlations that a classical model cannot easily replicate.</text>

  <!-- Footer legend -->
  <text x="650" y="865" text-anchor="middle" fill="#aaa" font-size="10">Quantum operations (circuit execution) in purple/blue · Classical computation (loss, optimization) in pink/green</text>
</svg>