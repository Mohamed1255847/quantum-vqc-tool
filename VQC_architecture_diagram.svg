<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 650" font-family="Arial, Helvetica, sans-serif">
  <defs>
    <linearGradient id="quantum" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea"/>
      <stop offset="100%" style="stop-color:#764ba2"/>
    </linearGradient>
    <linearGradient id="classical" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f093fb"/>
      <stop offset="100%" style="stop-color:#f5576c"/>
    </linearGradient>
    <linearGradient id="encoding-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4facfe"/>
      <stop offset="100%" style="stop-color:#00f2fe"/>
    </linearGradient>
    <linearGradient id="optimizer" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#43e97b"/>
      <stop offset="100%" style="stop-color:#38f9d7"/>
    </linearGradient>
    <linearGradient id="meas" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fa709a"/>
      <stop offset="100%" style="stop-color:#fee140"/>
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="115%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.2"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#555"/>
    </marker>
    <marker id="arrow-blue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#667eea"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1200" height="650" fill="#f8f9fa" rx="8"/>
  <rect x="0" y="0" width="1200" height="50" fill="#2c3e50" rx="8"/>
  <rect x="0" y="25" width="1200" height="25" fill="#2c3e50"/>
  <text x="600" y="33" text-anchor="middle" fill="white" font-size="18" font-weight="bold">Variational Quantum Classifier — Architecture Overview</text>

  <!-- SECTION LABELS -->
  <text x="80" y="80" fill="#667eea" font-size="13" font-weight="bold" text-anchor="middle">CLASSICAL</text>
  <text x="320" y="80" fill="#4facfe" font-size="13" font-weight="bold" text-anchor="middle">QUANTUM</text>
  <text x="610" y="80" fill="#764ba2" font-size="13" font-weight="bold" text-anchor="middle">QUANTUM</text>
  <text x="870" y="80" fill="#fa709a" font-size="13" font-weight="bold" text-anchor="middle">QUANTUM</text>
  <text x="1040" y="80" fill="#f5576c" font-size="13" font-weight="bold" text-anchor="middle">CLASSICAL</text>

  <!-- ============================================================ -->
  <!-- TOP LEVEL: DATA FLOW -->
  <!-- ============================================================ -->

  <!-- Box 1: Classical Data -->
  <rect x="20" y="95" width="120" height="65" rx="8" fill="white" stroke="#f093fb" stroke-width="2" filter="url(#shadow)"/>
  <text x="80" y="118" text-anchor="middle" fill="#f5576c" font-size="12" font-weight="bold">CLASSICAL DATA</text>
  <text x="80" y="136" text-anchor="middle" fill="#555" font-size="10">Features: x ∈ ℝⁿ</text>
  <text x="80" y="150" text-anchor="middle" fill="#555" font-size="10">Labels: y ∈ {0,1}</text>

  <!-- Arrow 1→2 -->
  <line x1="140" y1="128" x2="175" y2="128" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Box 2: Encoding -->
  <rect x="178" y="85" width="180" height="85" rx="8" fill="white" stroke="#4facfe" stroke-width="2" filter="url(#shadow)"/>
  <text x="268" y="104" text-anchor="middle" fill="#4facfe" font-size="12" font-weight="bold">DATA ENCODING</text>
  <line x1="190" y1="112" x2="345" y2="112" stroke="#ddd" stroke-width="0.5"/>
  <text x="268" y="128" text-anchor="middle" fill="#555" font-size="10">Basis Encoding</text>
  <text x="268" y="142" text-anchor="middle" fill="#999" font-size="9">PauliX if xᵢ &gt; 0.5</text>
  <text x="268" y="158" text-anchor="middle" fill="#555" font-size="10">Amplitude Encoding</text>
  <text x="268" y="165" text-anchor="middle" fill="#999" font-size="9">AmplitudeEmbedding(x)</text>

  <!-- Arrow 2→3 -->
  <line x1="358" y1="128" x2="393" y2="128" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Box 3: Variational Circuit -->
  <rect x="396" y="80" width="230" height="95" rx="8" fill="white" stroke="#667eea" stroke-width="2" filter="url(#shadow)"/>
  <text x="511" y="100" text-anchor="middle" fill="#667eea" font-size="12" font-weight="bold">VARIATIONAL CIRCUIT</text>
  <line x1="408" y1="107" x2="613" y2="107" stroke="#ddd" stroke-width="0.5"/>
  <text x="511" y="123" text-anchor="middle" fill="#555" font-size="10">L layers × [Rot(θ) on each qubit</text>
  <text x="511" y="138" text-anchor="middle" fill="#555" font-size="10">+ CNOT ring entanglement]</text>
  <text x="511" y="157" text-anchor="middle" fill="#999" font-size="9">N qubits (basis: N=features, ampl: N=config)</text>
  <text x="511" y="169" text-anchor="middle" fill="#999" font-size="9">Parameters: L × N × 3</text>

  <!-- Arrow 3→4 -->
  <line x1="626" y1="128" x2="661" y2="128" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Box 4: Measurement -->
  <rect x="664" y="90" width="130" height="75" rx="8" fill="white" stroke="#fa709a" stroke-width="2" filter="url(#shadow)"/>
  <text x="729" y="112" text-anchor="middle" fill="#fa709a" font-size="12" font-weight="bold">MEASUREMENT</text>
  <line x1="676" y1="119" x2="782" y2="119" stroke="#ddd" stroke-width="0.5"/>
  <text x="729" y="136" text-anchor="middle" fill="#555" font-size="10">⟨Z₀⟩ expectation</text>
  <text x="729" y="152" text-anchor="middle" fill="#555" font-size="10">on qubit 0</text>
  <text x="729" y="160" text-anchor="middle" fill="#999" font-size="9">Output ∈ [-1, +1]</text>

  <!-- Arrow 4→5 -->
  <line x1="794" y1="128" x2="829" y2="128" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Box 5: Classification -->
  <rect x="832" y="90" width="150" height="75" rx="8" fill="white" stroke="#f5576c" stroke-width="2" filter="url(#shadow)"/>
  <text x="907" y="112" text-anchor="middle" fill="#f5576c" font-size="12" font-weight="bold">CLASSIFICATION</text>
  <line x1="844" y1="119" x2="970" y2="119" stroke="#ddd" stroke-width="0.5"/>
  <text x="907" y="136" text-anchor="middle" fill="#555" font-size="10">sign(⟨Z₀⟩ + bias)</text>
  <text x="907" y="152" text-anchor="middle" fill="#555" font-size="10">→ Class 0 or 1</text>
  <text x="907" y="160" text-anchor="middle" fill="#999" font-size="9">bias = 0 (untrained)</text>

  <!-- Arrow 5→Output -->
  <line x1="982" y1="128" x2="1020" y2="128" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Output -->
  <rect x="1025" y="95" width="140" height="65" rx="8" fill="white" stroke="#43e97b" stroke-width="2" filter="url(#shadow)"/>
  <text x="1095" y="120" text-anchor="middle" fill="#2c3e50" font-size="12" font-weight="bold">PREDICTION</text>
  <text x="1095" y="140" text-anchor="middle" fill="#555" font-size="12">ŷ ∈ {0, 1}</text>

  <!-- ============================================================ -->
  <!-- QUANTUM CIRCUIT DETAIL (middle section) -->
  <!-- ============================================================ -->

  <text x="600" y="215" text-anchor="middle" fill="#2c3e50" font-size="14" font-weight="bold">Quantum Circuit Detail</text>

  <!-- Circuit background -->
  <rect x="30" y="228" width="1140" height="200" rx="6" fill="white" stroke="#e0e0e0" stroke-width="1"/>

  <!-- Qubit wires -->
  <!-- Qubit 0 -->
  <line x1="60" y1="270" x2="1140" y2="270" stroke="#667eea" stroke-width="1" stroke-dasharray="none"/>
  <text x="50" y="274" text-anchor="end" fill="#667eea" font-size="11" font-weight="bold">|0⟩</text>
  <text x="55" y="274" text-anchor="end" fill="#999" font-size="9">q₀</text>

  <!-- Qubit 1 -->
  <line x1="60" y1="320" x2="1140" y2="320" stroke="#667eea" stroke-width="1"/>
  <text x="50" y="324" text-anchor="end" fill="#667eea" font-size="11" font-weight="bold">|0⟩</text>
  <text x="55" y="324" text-anchor="end" fill="#999" font-size="9">q₁</text>

  <!-- Qubit N-1 with dots -->
  <line x1="60" y1="370" x2="1140" y2="370" stroke="#667eea" stroke-width="1"/>
  <text x="50" y="374" text-anchor="end" fill="#667eea" font-size="11" font-weight="bold">|0⟩</text>
  <text x="55" y="374" text-anchor="end" fill="#999" font-size="9">q_{N-1}</text>

  <!-- Dots between qubits (ellipsis text below) -->
  <text x="1130" y="300" text-anchor="middle" fill="#999" font-size="16">⋮</text>
  <text x="1130" y="348" text-anchor="middle" fill="#999" font-size="16">⋮</text>

  <!-- ============ ENCODING SECTION ============ -->
  <rect x="100" y="250" width="140" height="175" rx="4" fill="rgba(79,172,254,0.08)" stroke="#4facfe" stroke-width="1.5" stroke-dasharray="4,2"/>
  <text x="170" y="268" text-anchor="middle" fill="#4facfe" font-size="11" font-weight="bold">ENCODING</text>

  <!-- Basis encoding: PauliX boxes on q0, q1 -->
  <rect x="120" y="258" width="30" height="24" rx="3" fill="white" stroke="#4facfe" stroke-width="1.5"/>
  <text x="135" y="274" text-anchor="middle" fill="#4facfe" font-size="10" font-weight="bold">X</text>
  <text x="135" y="246" text-anchor="middle" fill="#999" font-size="8">if x₀&gt;0.5</text>

  <!-- Amplitude encoding box spanning all qubits -->
  <rect x="175" y="260" width="55" height="160" rx="4" fill="rgba(79,172,254,0.12)" stroke="#4facfe" stroke-width="1.2"/>
  <text x="202" y="310" text-anchor="middle" fill="#4facfe" font-size="9" font-weight="bold" transform="rotate(-90, 202, 340)">AmplitudeEmbedding</text>

  <!-- ============ VARIATIONAL LAYERS ============ -->

  <!-- Layer 1 -->
  <rect x="300" y="250" width="220" height="175" rx="4" fill="rgba(102,126,234,0.06)" stroke="#667eea" stroke-width="1.5" stroke-dasharray="4,2"/>
  <text x="410" y="268" text-anchor="middle" fill="#667eea" font-size="11" font-weight="bold">LAYER 1</text>

  <!-- Rot on q0 -->
  <rect x="315" y="258" width="50" height="24" rx="3" fill="white" stroke="#764ba2" stroke-width="1.2"/>
  <text x="340" y="274" text-anchor="middle" fill="#764ba2" font-size="8" font-weight="bold">Rot(θ)</text>

  <!-- Rot on q1 -->
  <rect x="315" y="308" width="50" height="24" rx="3" fill="white" stroke="#764ba2" stroke-width="1.2"/>
  <text x="340" y="324" text-anchor="middle" fill="#764ba2" font-size="8" font-weight="bold">Rot(θ)</text>

  <!-- Rot on qN-1 -->
  <rect x="315" y="358" width="50" height="24" rx="3" fill="white" stroke="#764ba2" stroke-width="1.2"/>
  <text x="340" y="374" text-anchor="middle" fill="#764ba2" font-size="8" font-weight="bold">Rot(θ)</text>

  <!-- CNOT gate q0→q1 -->
  <circle cx="410" cy="270" r="4" fill="#667eea" stroke="#667eea" stroke-width="2"/>
  <line x1="410" y1="270" x2="410" y2="320" stroke="#667eea" stroke-width="2"/>
  <circle cx="410" cy="320" r="5" fill="none" stroke="#667eea" stroke-width="2"/>
  <line x1="406" y1="316" x2="414" y2="324" stroke="#667eea" stroke-width="2"/>
  <line x1="414" y1="316" x2="406" y2="324" stroke="#667eea" stroke-width="2"/>

  <!-- CNOT gate q1→q2 -->
  <circle cx="450" cy="320" r="4" fill="#667eea" stroke="#667eea" stroke-width="2"/>
  <line x1="450" y1="320" x2="450" y2="370" stroke="#667eea" stroke-width="2"/>
  <circle cx="450" cy="370" r="5" fill="none" stroke="#667eea" stroke-width="2"/>
  <line x1="446" y1="366" x2="454" y2="374" stroke="#667eea" stroke-width="2"/>
  <line x1="454" y1="366" x2="446" y2="374" stroke="#667eea" stroke-width="2"/>

  <!-- CNOT ring: qN-1→q0 -->
  <circle cx="490" cy="370" r="4" fill="#667eea" stroke="#667eea" stroke-width="2"/>
  <path d="M 490 370 Q 520 370 520 320 Q 520 270 490 270" fill="none" stroke="#667eea" stroke-width="2"/>
  <circle cx="490" cy="270" r="5" fill="none" stroke="#667eea" stroke-width="2"/>
  <line x1="486" y1="266" x2="494" y2="274" stroke="#667eea" stroke-width="2"/>
  <line x1="494" y1="266" x2="486" y2="274" stroke="#667eea" stroke-width="2"/>

  <!-- Repeat indicator → -->
  <text x="530" y="340" text-anchor="middle" fill="#667eea" font-size="24" font-weight="bold">⋯</text>
  <text x="545" y="355" text-anchor="middle" fill="#999" font-size="10">× L layers</text>

  <!-- Last Layer -->
  <rect x="570" y="250" width="220" height="175" rx="4" fill="rgba(102,126,234,0.06)" stroke="#667eea" stroke-width="1.5" stroke-dasharray="4,2"/>
  <text x="680" y="268" text-anchor="middle" fill="#667eea" font-size="11" font-weight="bold">LAYER L</text>

  <!-- Rot on q0 -->
  <rect x="585" y="258" width="50" height="24" rx="3" fill="white" stroke="#764ba2" stroke-width="1.2"/>
  <text x="610" y="274" text-anchor="middle" fill="#764ba2" font-size="8" font-weight="bold">Rot(θ)</text>

  <!-- Rot on q1 -->
  <rect x="585" y="308" width="50" height="24" rx="3" fill="white" stroke="#764ba2" stroke-width="1.2"/>
  <text x="610" y="324" text-anchor="middle" fill="#764ba2" font-size="8" font-weight="bold">Rot(θ)</text>

  <!-- Rot on qN-1 -->
  <rect x="585" y="358" width="50" height="24" rx="3" fill="white" stroke="#764ba2" stroke-width="1.2"/>
  <text x="610" y="374" text-anchor="middle" fill="#764ba2" font-size="8" font-weight="bold">Rot(θ)</text>

  <!-- CNOT gates in last layer (simplified - just show one) -->
  <circle cx="680" cy="270" r="4" fill="#667eea"/>
  <line x1="680" y1="270" x2="680" y2="320" stroke="#667eea" stroke-width="2"/>
  <circle cx="680" cy="320" r="5" fill="none" stroke="#667eea" stroke-width="2"/>
  <line x1="676" y1="316" x2="684" y2="324" stroke="#667eea" stroke-width="2"/>
  <line x1="684" y1="316" x2="676" y2="324" stroke="#667eea" stroke-width="2"/>

  <circle cx="720" cy="320" r="4" fill="#667eea"/>
  <line x1="720" y1="320" x2="720" y2="370" stroke="#667eea" stroke-width="2"/>
  <circle cx="720" cy="370" r="5" fill="none" stroke="#667eea" stroke-width="2"/>
  <line x1="716" y1="366" x2="724" y2="374" stroke="#667eea" stroke-width="2"/>
  <line x1="724" y1="366" x2="716" y2="374" stroke="#667eea" stroke-width="2"/>

  <circle cx="760" cy="370" r="4" fill="#667eea"/>
  <path d="M 760 370 Q 790 370 790 320 Q 790 270 760 270" fill="none" stroke="#667eea" stroke-width="2"/>
  <circle cx="760" cy="270" r="5" fill="none" stroke="#667eea" stroke-width="2"/>
  <line x1="756" y1="266" x2="764" y2="274" stroke="#667eea" stroke-width="2"/>
  <line x1="764" y1="266" x2="756" y2="274" stroke="#667eea" stroke-width="2"/>

  <!-- ============ MEASUREMENT SECTION ============ -->
  <rect x="840" y="250" width="130" height="175" rx="4" fill="rgba(250,112,154,0.08)" stroke="#fa709a" stroke-width="1.5" stroke-dasharray="4,2"/>
  <text x="905" y="268" text-anchor="middle" fill="#fa709a" font-size="11" font-weight="bold">MEASURE</text>

  <!-- Meter symbol on q0 -->
  <rect x="855" y="258" width="40" height="24" rx="3" fill="white" stroke="#fa709a" stroke-width="1.5"/>
  <text x="875" y="274" text-anchor="middle" fill="#fa709a" font-size="10" font-weight="bold">⟨Z₀⟩</text>

  <!-- No measurement on q1 -->
  <text x="905" y="324" text-anchor="middle" fill="#ccc" font-size="10">(discarded)</text>

  <!-- No measurement on qN-1 -->
  <text x="905" y="374" text-anchor="middle" fill="#ccc" font-size="10">(discarded)</text>

  <!-- Output arrow from measurement -->
  <line x1="970" y1="270" x2="1040" y2="270" stroke="#fa709a" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- sign box -->
  <rect x="1045" y="258" width="80" height="24" rx="3" fill="white" stroke="#f5576c" stroke-width="1.5"/>
  <text x="1085" y="274" text-anchor="middle" fill="#f5576c" font-size="10" font-weight="bold">sign(+bias)</text>

  <!-- Prediction output -->
  <text x="1140" y="274" text-anchor="middle" fill="#2c3e50" font-size="12" font-weight="bold">ŷ</text>

  <!-- ============================================================ -->
  <!-- OPTIMIZATION LOOP (bottom) -->
  <!-- ============================================================ -->

  <text x="600" y="455" text-anchor="middle" fill="#2c3e50" font-size="14" font-weight="bold">Classical Optimization Loop</text>

  <rect x="100" y="470" width="1000" height="150" rx="8" fill="white" stroke="#43e97b" stroke-width="2" filter="url(#shadow)"/>

  <!-- Step boxes in the loop -->
  <rect x="130" y="495" width="150" height="50" rx="6" fill="rgba(67,233,123,0.1)" stroke="#43e97b" stroke-width="1.5"/>
  <text x="205" y="514" text-anchor="middle" fill="#2c3e50" font-size="11" font-weight="bold">Loss Function</text>
  <text x="205" y="533" text-anchor="middle" fill="#666" font-size="9">Square / Cross-Entropy / Both</text>

  <line x1="280" y1="520" x2="320" y2="520" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="325" y="495" width="150" height="50" rx="6" fill="rgba(67,233,123,0.1)" stroke="#43e97b" stroke-width="1.5"/>
  <text x="400" y="514" text-anchor="middle" fill="#2c3e50" font-size="11" font-weight="bold">Gradient Descent</text>
  <text x="400" y="533" text-anchor="middle" fill="#666" font-size="9">Parameter-Shift Rule</text>

  <line x1="475" y1="520" x2="515" y2="520" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="520" y="495" width="160" height="50" rx="6" fill="rgba(67,233,123,0.1)" stroke="#43e97b" stroke-width="1.5"/>
  <text x="600" y="514" text-anchor="middle" fill="#2c3e50" font-size="11" font-weight="bold">Weight Update</text>
  <text x="600" y="533" text-anchor="middle" fill="#666" font-size="9">Nesterov / Adam / RMSProp / GD</text>

  <line x1="680" y1="520" x2="720" y2="520" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="725" y="495" width="150" height="50" rx="6" fill="rgba(67,233,123,0.1)" stroke="#43e97b" stroke-width="1.5"/>
  <text x="800" y="514" text-anchor="middle" fill="#2c3e50" font-size="11" font-weight="bold">Accuracy Eval</text>
  <text x="800" y="533" text-anchor="middle" fill="#666" font-size="9">sign(⟨Z₀⟩) vs y</text>

  <line x1="875" y1="520" x2="915" y2="520" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="920" y="495" width="150" height="50" rx="6" fill="rgba(67,233,123,0.1)" stroke="#43e97b" stroke-width="1.5"/>
  <text x="995" y="514" text-anchor="middle" fill="#2c3e50" font-size="11" font-weight="bold">Converged?</text>
  <text x="995" y="533" text-anchor="middle" fill="#666" font-size="9">Max iterations</text>

  <!-- Feedback arrow back to circuit -->
  <path d="M 600 545 L 600 565 L 340 565 L 340 240" fill="none" stroke="#667eea" stroke-width="2" stroke-dasharray="6,3" marker-end="url(#arrow-blue)"/>
  <text x="470" y="580" text-anchor="middle" fill="#667eea" font-size="10" font-style="italic">new weights θ fed back into quantum circuit</text>

  <!-- Legend -->
  <rect x="30" y="610" width="12" height="12" fill="#667eea" rx="2"/>
  <text x="48" y="621" fill="#555" font-size="10">Quantum</text>
  <rect x="130" y="610" width="12" height="12" fill="#f5576c" rx="2"/>
  <text x="148" y="621" fill="#555" font-size="10">Classical</text>
  <line x1="230" y1="615" x2="260" y2="615" stroke="#667eea" stroke-width="2" stroke-dasharray="6,3"/>
  <text x="266" y="621" fill="#555" font-size="10">Parameter feedback</text>
</svg>